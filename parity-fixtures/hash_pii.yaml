# Parity fixtures for cerberus_core.hash_pii.
#
# hash_pii(value, secret_key) → str:
#   - HMAC-SHA256 of `value` keyed on `secret_key`, hex-encoded (lowercase).
#   - Both `value` and `secret_key` may be passed as str or bytes; the
#     output is identical (UTF-8 encoded internally).
#   - value is None → output is None.
#
# Both runners assert: `hash_pii(input.value, input.secret_key) == expected`.
#
# **Test secret is intentionally public.** It is hard-coded as
# "cerberus-parity-test-key-v1" so the same fixed inputs produce the
# same fixed digests in any language. Production deploys use a different
# secret distributed via event_ingest's /api/secret-key endpoint.
#
# See cerberus-core/src/cerberus_core/sanitization.py:58-80 for the
# canonical implementation.
#
# Hash values were generated by:
#   from cerberus_core import hash_pii
#   hash_pii("192.168.1.1", "cerberus-parity-test-key-v1")
# Regenerate them using the same command if you update inputs.
cases:
  # --- IP addresses (the primary PII path) ---

  - name: ipv4_with_test_secret
    input:
      value: "192.168.1.1"
      secret_key: "cerberus-parity-test-key-v1"
    expected: "dde4b5e916e658bdfe3bf7ab8fd6361aa3ef212bccf9fa4f62de60d9c78b838e"

  - name: ipv6_loopback_with_test_secret
    input:
      value: "::1"
      secret_key: "cerberus-parity-test-key-v1"
    expected: "4e9dbe33ee02f947c9a6e4b5f25ec52ad208c8508672c182281d9a9119f3d557"

  # In production we always normalize_ip BEFORE hashing — this fixture
  # locks in the post-normalize digest so that "fe80::1%eth0" and
  # "fe80::1" both produce this hash after going through the pipeline.
  # The Rust port must call normalize_ip first; otherwise the unstripped
  # zone ID produces a different hash and the same logical IP would
  # double-count in analytics.
  - name: ipv6_link_local_post_normalize_with_test_secret
    input:
      value: "fe80::1"
      secret_key: "cerberus-parity-test-key-v1"
    expected: "51928821f9313ada25d26cd5468f9ebe5e151e505cdcdc62bba0de9afc0ae16e"

  # --- Authorization headers (the second PII path; HMAC keeps
  #     auth-token-based user tracking working without storing the raw
  #     bearer token) ---

  - name: bearer_token_with_test_secret
    input:
      value: "Bearer abc123token"
      secret_key: "cerberus-parity-test-key-v1"
    expected: "a1bee22471588b1572f3f95d86e5f776871241c2fb2d3f29fc435b8ef2c9b9ef"

  - name: bearer_token_with_different_secret
    # Same value with a different secret must produce a different
    # digest. Confirms the secret is keyed (not a constant prefix or
    # similar implementation bug).
    input:
      value: "Bearer abc123token"
      secret_key: "a-different-secret"
    expected: "4c460a5cd725ceab09e40eee0a67e4285095caf6e15fa045f46602705ca41b7e"

  # --- Determinism / null handling ---

  - name: null_value_returns_null
    input:
      value: null
      secret_key: "cerberus-parity-test-key-v1"
    expected: null
