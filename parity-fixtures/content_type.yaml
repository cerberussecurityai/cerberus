# Parity fixtures for the request-body content-type matching rule.
#
# Both implementations apply a case-insensitive substring check:
#   "application/json" in content_type.lower()
#
# Both runners assert:
#   matches_json_content_type(content_type) == expected_capture
cases:
  # --- Captured ---

  - name: standard_json
    content_type: "application/json"
    expected_capture: true

  - name: json_with_charset_utf8
    # The substring rule must accept this — Django, the Flask middleware,
    # and most browsers/clients append charset.
    content_type: "application/json; charset=utf-8"
    expected_capture: true

  - name: json_with_charset_iso8859
    content_type: "application/json; charset=ISO-8859-1"
    expected_capture: true

  - name: json_uppercase_captured
    # Case-insensitive: matches even when client sent mixed-case.
    content_type: "Application/JSON"
    expected_capture: true

  # --- NOT captured ---

  - name: vnd_api_json_NOT_captured
    # The big footgun. "application/vnd.api+json" does NOT contain the
    # substring "application/json" (the "json" is preceded by "+", not
    # "/"). Both implementations must skip this content-type.
    content_type: "application/vnd.api+json"
    expected_capture: false

  - name: vnd_other_json_NOT_captured
    content_type: "application/vnd.foo+json"
    expected_capture: false

  - name: ld_json_NOT_captured
    # JSON-LD has the same "+json" structure dressed up as a separate
    # type. Skipped for the same reason.
    content_type: "application/ld+json"
    expected_capture: false

  - name: form_urlencoded
    content_type: "application/x-www-form-urlencoded"
    expected_capture: false

  - name: multipart_form
    content_type: "multipart/form-data; boundary=---xyz"
    expected_capture: false

  - name: text_plain
    content_type: "text/plain"
    expected_capture: false

  - name: empty_string
    content_type: ""
    expected_capture: false

  - name: text_json_NOT_captured
    # Some legacy systems send `text/json` — Django's substring check
    # does not match this. Documenting the divergence so the Rust port
    # doesn't decide to be "more lenient" and break parity.
    content_type: "text/json"
    expected_capture: false
