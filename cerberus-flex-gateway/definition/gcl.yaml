---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: Extension
metadata:
  labels:
    title: cerberus-flex-gateway
    description: "Captures HTTP request metadata, sanitizes PII, and ships events to the Cerberus backend."
    category: Custom
    metadata/interfaceScope: api,resource
spec:
  extends:
    - name: extension-definition
      namespace: default
  properties:
    # ---------------------------------------------------------------------
    # Required
    # ---------------------------------------------------------------------
    ingestService:
      type: string
      format: service
      description: "Cerberus backend URL (e.g. https://ingest.cerberus.example.com). The policy POSTs to {ingestService}/v1/ingest/batch. `format: service` causes Flex Gateway to register an Envoy cluster for this URL at policy load — required for outbound dispatch from the WASM filter."
    token:
      type: string
      description: "Cerberus API key. Sent as the X-API-Key header on outbound requests to the Cerberus backend."
      "@context":
        "@characteristics":
          - "security:sensitive"

    # ---------------------------------------------------------------------
    # PII hashing
    # ---------------------------------------------------------------------
    secretKey:
      type: string
      description: "Optional. HMAC-SHA256 key used to hash source IP and Authorization headers. If omitted, the policy fetches it from {backendUrl}/api/secret-key at startup. If neither is set, PII is emitted raw with a one-time warning log."
      "@context":
        "@characteristics":
          - "security:sensitive"
    backendUrl:
      type: string
      format: service
      description: "Optional. Cerberus backend to fetch the HMAC secret from at startup; the policy GETs {backendUrl}/api/secret-key. `format: service` registers an Envoy cluster for this URL at policy load — required for the init-time outbound fetch, since proxy-wasm only dispatches to registered clusters. Fetched once with a 5s timeout; failure logs a warning and falls back to raw PII. Use https:// in production. Typically the same host as ingestService."

    # ---------------------------------------------------------------------
    # Custom PII scrubbing
    # ---------------------------------------------------------------------
    customSensitiveKeys:
      type: array
      items:
        type: string
      description: "Optional. Extra field names whose values are redacted in query params and JSON bodies, matched case-insensitively (e.g. member_number, internal_customer_id). Additive to the built-in SENSITIVE_KEYS floor — built-in redactions (password, token, ssn, ...) always apply and cannot be removed. Matching a key replaces its entire value (nested objects/arrays included) with [REDACTED]. Entries are trimmed; blank entries are ignored with a startup warning. Applies to params and bodies only — header handling is governed by captureHeaders + the fixed SENSITIVE_HEADERS set."
    customPiiPatterns:
      type: array
      items:
        type: object
        properties:
          pattern:
            type: string
            description: "Regex to match. Linear-time engine (no catastrophic backtracking); character classes \\d \\w \\s are ASCII-only. Patterns match case-insensitively by default — prefix with (?-i) to opt out. Invalid patterns fail policy load."
          label:
            type: string
            description: "Optional human-readable rule name (e.g. ssn, member-id). Used in startup logs and config error messages only; never appears in event output."
          action:
            type: string
            description: "Optional. redact (default) replaces matches with [REDACTED]. hash replaces each match with its HMAC-SHA256 hex digest (keyed on the policy's secret), keeping stable identifiers correlatable without shipping the raw value; if no HMAC secret is available, hash falls back to redact — matched PII never ships raw."
          scope:
            type: string
            description: "Optional. values (default) rewrites matched substrings inside string values — e.g. an SSN embedded in free text. keys matches field NAMES and replaces the whole value (like customSensitiveKeys, but regex). both does both."
      description: "Optional. Regex scrubbing rules applied to query params and JSON request bodies (including captured LLM/AI prompt bodies — this is the mechanism that reaches inside free-form prompt text). Rules apply in declaration order after built-in key redaction; each value-scope rule scans the previous rule's output. Rules only ever add scrubbing on top of the built-in floor. Compiled once at policy load; a rule that fails to compile (bad regex, unknown action/scope) fails policy load rather than silently not scrubbing. Matching cost is O(rules × body size) on the request path — keep rule counts modest on high-RPS APIs. See README 'Custom PII scrubbing' for examples."
    clientIpHeader:
      type: string
      default: "X-Forwarded-For"
      description: "Request header to read the client IP from. The first hop is used (left-most value before any comma). Falls back to the connection source address if the header is absent."
    userIdHeader:
      type: string
      description: "Optional. Request header to read end-user identity from (e.g. X-User-Id, X-End-User). The customer's upstream auth/JWT policy must populate the header pre-Cerberus. Required for per-end-user anomaly detection. Left intentionally configurable rather than defaulted so each deployment can pick its own header name."
    captureHeaders:
      type: array
      items:
        type: string
      description: "Optional allowlist of request header names to capture, matched case-insensitively (e.g. Content-Type, User-Agent, X-Request-Id). If non-empty, ONLY these headers are included in the event's headers map; all others are omitted entirely. Empty/unset = capture all headers. Entries are trimmed of surrounding whitespace and blank entries are ignored; a list containing only blank entries counts as empty, so ALL headers are captured and the policy logs a startup warning. Sanitization still applies to allowlisted headers — Authorization is HMAC'd or redacted and other sensitive headers are redacted even when listed. Governs only the headers map: the dedicated user_agent field and the clientIpHeader / userIdHeader lookups are configured separately and unaffected."

    # ---------------------------------------------------------------------
    # Path scoping (the primary lever for high-RPS deployments)
    # ---------------------------------------------------------------------
    capturePaths:
      type: array
      items:
        type: string
      description: "Optional glob patterns (e.g. /api/v1/**, /users/*). If non-empty, ONLY matching request paths generate events. Non-matching requests pass through with no buffering, no sanitization, and no event — pure latency-free. Empty/unset = capture everything. Health endpoints (/health, /health_check, /ready) are always skipped regardless."
    excludePaths:
      type: array
      items:
        type: string
      description: "Optional glob patterns. Matching paths are skipped. Applied AFTER capturePaths — useful for exempting noisy subroutes within an otherwise-captured prefix. Glob syntax is the `globset` crate's: `*` matches one path segment, `**` matches any number of segments."

    # ---------------------------------------------------------------------
    # Sampling
    # ---------------------------------------------------------------------
    sampleRate:
      type: number
      default: 1
      minimum: 0
      maximum: 1
      description: "Fraction of capturable traffic to sample, 0 to 1. 1 = capture every request (default); 0.25 = ~25% of requests; 0 = capture nothing. Requests that are not sampled do no capture work at all (no header/body extraction, no sanitization, no event) and pass through untouched. Applied after capturePaths/excludePaths and the health-endpoint filter, so it reads as 'fraction of otherwise-captured traffic'. Per-request and memoryless (no per-client or per-trace stickiness); uses a non-cryptographic per-worker PRNG. Out-of-range values are clamped with a startup warning."

    # ---------------------------------------------------------------------
    # Body capture
    # ---------------------------------------------------------------------
    captureRequestBody:
      type: boolean
      default: true
      description: "Buffer + sanitize JSON request bodies (POST/PUT/PATCH, application/json content-type, 1MB cap). Disable globally to skip the buffering cost; for per-route scoping use capturePaths / excludePaths."
    captureAiContent:
      type: boolean
      default: true
      description: "Capture request bodies for LLM/AI traffic. Default true: requests detected as LLM/AI — via well-known LLM API paths (/chat/completions, /v1/messages, :generateContent, /converse, /embeddings, Bedrock /model/*/invoke, Vertex :predict, ...) or prompt-shaped JSON bodies (messages/prompt/contents/message/chat_history/texts alongside model, ...) — have their body captured and sanitized like any other JSON body. Built-in sanitization is key-matching only; configure customPiiPatterns value rules to scrub regex-shaped PII (SSNs, emails, account numbers) inside free-form prompt text — PII with no stable shape still ships raw. Set to false to withhold prompt content: detected AI traffic then ships its event WITHOUT the body, while endpoint, method, sanitized headers and query params still ship, so AI endpoint discovery keeps working. MCP (JSON-RPC) bodies are never treated as AI content — they are structured and standard sanitization applies. (When false, the path check runs before body inspection, so JSON-RPC posted to a well-known LLM API path also ships without its body.)"

    # NOTE: captureResponseBody is intentionally absent in v1.
    # Response-body mutation interacts badly with Content-Length /
    # Content-Encoding / streaming bodies / signed responses.
    # See README "Known gaps in v1".
    # If we add it later: bump endpoint version to /v2/ingest/batch.
    # When response capture is added, response bodies must respect
    # captureAiContent — model output carries the same PII risk as prompts.

    # ---------------------------------------------------------------------
    # Buffering / batching
    # ---------------------------------------------------------------------
    batchSize:
      type: integer
      default: 50
      minimum: 1
      maximum: 1000
      description: "Max events per outbound POST to ingestService. Server-side cap is 1000; larger values would 413."
    flushIntervalMs:
      type: integer
      default: 2000
      minimum: 100
      maximum: 60000
      description: "How often (ms) the buffered events are flushed to ingestService. Lower values reduce in-memory loss on pod churn at the cost of more request frequency. 100ms minimum prevents tight-loop misconfigurations."
    queueCapacity:
      type: integer
      default: 10000
      minimum: 100
      maximum: 1000000
      description: "Per-WORKER bounded queue capacity. Total memory usage = workers × queueCapacity × per-event size (~2-10 KB). Drop-on-full with a counter included in the next batch payload — never blocks the request path."

    # ---------------------------------------------------------------------
    # Operational
    # ---------------------------------------------------------------------
    logLevel:
      type: string
      default: "info"
      description: "Log verbosity. One of: debug, info, warn, error. Increase to debug to trace per-request capture decisions and outbound POST traffic."

  required:
    - ingestService
    - token
