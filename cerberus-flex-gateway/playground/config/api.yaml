---
apiVersion: gateway.mulesoft.com/v1alpha1
kind: ApiInstance
metadata:
  name: cerberus-flex-test
spec:
  address: http://0.0.0.0:8081
  services:
    upstream:
      address: http://echo:8080
      routes:
        - config:
            destinationPath: /anything/echo/
  policies:
    - policyRef:
        # Patched by `make run` from $(POLICY_REF_NAME) — the value
        # below is a placeholder so this file is valid as committed.
        name: cerberus-flex-gateway-flex-v0-1
        namespace: default
      config:
        ingestService: http://echo:8080
        token: dev-token
        # Local-mode hashing: comment out secretKey to test the
        # "no secret → raw PII + warn log" fallback path.
        secretKey: cerberus-parity-test-key-v1
        clientIpHeader: X-Forwarded-For
        # No userIdHeader by default — set to e.g. X-User-Id once your
        # upstream auth policy populates it.
        capturePaths: []
        excludePaths: []
        # Customer PII scrubbing (see README "Custom PII scrubbing").
        # Exercise locally: POST a body like
        #   {"member_number":"M-1","note":"ssn 123-45-6789","account":"ACC-42"}
        # → member_number and the SSN redact; account hashes (secretKey set).
        customSensitiveKeys:
          - member_number
        customPiiPatterns:
          - pattern: '\b\d{3}-\d{2}-\d{4}\b'
            label: ssn
          - pattern: '^ACC-\d+$'
            label: account
            action: hash
        captureRequestBody: true
        batchSize: 50
        flushIntervalMs: 2000
        queueCapacity: 10000
        logLevel: debug
